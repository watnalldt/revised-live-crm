name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.11']

    env:
      DATABASE_URL: 'sqlite://:memory:'
      SECRET_KEY: 'zt(6jlr#oquxm2t%ryh#n+-72p^(3knbf&q$5x16#o%1im-s7!'
      RECAPTCHA_PUBLIC_KEY: ${{ secrets.RECAPTCHA_PUBLIC_KEY }}
      RECAPTCHA_PRIVATE_KEY: ${{ secrets.RECAPTCHA_PRIVATE_KEY }}

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
#    - name: Set up environment variables
#      run: |
#        echo "export RECAPTCHA_PUBLIC_KEY=${{ secrets.RECAPTCHA_PUBLIC_KEY }}" >> $GITHUB_ENV
#        echo "export RECAPTCHA_PRIVATE_KEY=${{ secrets.RECAPTCHA_PRIVATE_KEY }}" >> $GITHUB_ENV
#        echo "export EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}" >> $GITHUB_ENV
#        echo "export EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> $GITHUB_ENV
#        echo "export EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> $GITHUB_ENV
#        echo "export EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}" >> $GITHUB_ENV
#        echo "export EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" >> $GITHUB_ENV
#        echo "export EMAIL_USE_TLS=False" >> $GITHUB_ENV


    - name: Lint with Ruff
      run: ruff .

    - name: Run Tests
      env:
        SECRET_KEY: ${{ env.SECRET_KEY }}
      run: |
          coverage run -m pytest
